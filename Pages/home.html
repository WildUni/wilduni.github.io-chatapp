
<wa-page>
     <!-- <div slot="navigation"> -->
                <!-- <button style="padding: 0;" slot="nav">
                    <wa-icon name="pen-to-square" variant="regular" @click='console.log("hey")'></wa-icon>
                </button> -->
    <!-- </div> -->

    <wa-tab-group slot="navigation" withoutScrollControls>
        <wa-tab panel="chats">
            Chats
        </wa-tab>

        <wa-tab
            panel="branches"
            :disabled.prop="activeChatId == null || activeChatId === ''">
            Branches
        </wa-tab>

        <wa-tab-panel name="chats">
            <ChatList @update-active-chat="setActiveChat"></ChatList>
        </wa-tab-panel>

        <wa-tab-panel name="branches">
            <ChatTree @update-active-chat="setActiveChat"></ChatTree>
        </wa-tab-panel>

        <div slot="nav" style="margin-left: auto;">
            <CreateChatButton></CreateChatButton>
        </div>
    </wa-tab-group>

    <div slot='navigation-footer'>
        <!-- <div class="profile-pill">
            <img :src="profileImageUrl" style="width: 30px;">
            <div>{{profileName}}</div>
        </div> -->

        <Profile></Profile>
    </div>

    <div slot="main-header">
        <div v-if="activeChatId">
            <h1>{{activeChatName}}</h1>
            <!-- {{newChatName}}
            <input 
            v-model='newChatName'
            @keydown.enter="createNewChat(activeChatId, activeChatRootId)"/> -->
        </div>
        <h1 v-else>Public Chats</h1>
        
    </div>
    <div slot="aside">
        <button @click="$graffiti.logout($graffitiSession.value)">
            Log Out
        </button>
    </div>

    <div slot="main-footer">
        <ChatInput></ChatInput>
    </div>

    
    <main>
        <section v-if="activeChatId">
            <ChatFlow/>
        </section>
        <section v-else>
            <ChatFlow/>
        </section>
    </main>

    
</wa-page>
