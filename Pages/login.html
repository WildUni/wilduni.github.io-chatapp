<section
    style="
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #f7f8fb;
        color: #1f2937;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    "
>
    <div
        style="
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        "
    >
        <header style="display: flex; flex-direction: column; gap: 8px; text-align: center;">
            <div
                aria-hidden="true"
                style="
                    width: 56px;
                    height: 56px;
                    margin: 0 auto;
                    display: grid;
                    place-items: center;
                    border-radius: 14px;
                    background: #1f2937;
                    color: white;
                    font-size: 28px;
                    font-weight: 800;
                "
            >
                C
            </div>
            <h1 style="font-size: 40px; line-height: 1; margin: 0;">ChaTree</h1>
            <p style="margin: 0; color: #64748b; line-height: 1.5;">
                Sign in to keep your conversations growing.
            </p>
        </header>

        <div
            style="
                display: flex;
                flex-direction: column;
                gap: 16px;
                padding: 24px;
                border: 1px solid #e2e8f0;
                border-radius: 8px;
                background: white;
                box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
            "
        >
            <div style="display: flex; flex-direction: column; gap: 4px;">
                <h2 style="margin: 0; font-size: 20px;">Welcome back</h2>
                <p style="margin: 0; color: #64748b; line-height: 1.5;">
                    Continue with your Graffiti account.
                </p>
            </div>

            <wa-button appearance="filled" variant="brand" size="large" @click="$graffiti.login()">
                Log in
            </wa-button>
        </div>
    </div>
</section>
