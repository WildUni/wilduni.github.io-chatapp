<wa-tree
  v-if="nestedTree.length"
  class="tree-with-lines"
  selection="single"
  @wa-selection-change="syncSelectedBranch"
>
  <TreeNode
    v-for="node in nestedTree"
    :key="node.id"
    :node="node"
    :active-chat-id="activeChatId"
    @select-chat="emitUpdateChat"
    @create-branch="emitCreateBranch"
    @delete-branch="emitDeleteBranch"
  />
</wa-tree>

<p v-else>Select a chat to view its branch tree.</p>
