<h3>Branch under current Chat</h3>

<div class="branch-create-form">
  <input
    v-model="branchName"
    placeholder="New branch name"
    maxlength="30"
    type="text"
    @keydown.enter="createBranchUnderActiveChat"
  />
  <wa-button
    variant="brand"
    @click="createBranchUnderActiveChat"
    :disabled.prop="isCreating || !branchName.trim()"
  >
    <wa-spinner v-if="isCreating"></wa-spinner>
    <wa-icon name="check" v-else-if="createSuccess"></wa-icon>
    <wa-icon name="code-branch" v-else></wa-icon>
    {{ isCreating ? "Creating..." : createSuccess ? "Branch Created" : "Create Branch" }}
  </wa-button>
</div>

<p v-if="createError" class="branch-create-error">Branch creation failed. Please try again.</p>

<wa-tree
  v-if="nestedTree.length"
  class="tree-with-lines"
  selection="single"
  @wa-selection-change="syncSelectedBranch"
>
  <TreeNode
    v-for="node in nestedTree"
    :key="node.id"
    :node="node"
    :active-chat-id="activeChatId"
    @select-chat="emitUpdateChat"
  />
</wa-tree>

<p v-else>Select a chat to view its branch tree.</p>
