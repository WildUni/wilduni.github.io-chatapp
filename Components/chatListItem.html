<div class="chat-list-item"  
  :class="{ selected: isSelected }">
  <wa-skeleton
    v-if="isChatImageLoading"
    effect="pulse"
    class="chat-list-avatar-skeleton"
  ></wa-skeleton>
  <wa-avatar
    v-else-if="chatImageUrl"
    label="Chat image"
    :image.prop="chatImageUrl"
  ></wa-avatar>
  <div
    v-else-if="previewMembers.length"
    class="chat-list-member-stack"
    aria-label="Chat members"
  >
    <wa-avatar
      v-for="member in previewMembers"
      :key="member.user"
      label="Member avatar"
      :image.prop="member.profile.avatarUrl || ''"
      class="chat-list-member-avatar"
    ></wa-avatar>
  </div>
  <wa-avatar
    v-else
    label="Chat image"
  ></wa-avatar>
  <span
    v-if="hasUnread"
    class="unread-dot chat-unread-dot"
    aria-label="Unread messages"
  ></span>
  <div class="chatListItem-wrapper">
    <div class="chatListItem-name fade-text">{{chatName}}</div>
    <div v-if="isMessagePreviewLoading" class="chatListItem-preview-row">
      <wa-skeleton
        effect="pulse"
        class="chat-list-preview-skeleton"
      ></wa-skeleton>
    </div>
    <div v-else class="chatListItem-preview-row">
      <span class="chatListItem-preview fade-text">{{ latestMessageText }}</span>
      <span v-if="latestMessageAge" class="chatListItem-time">{{ latestMessageAge }}</span>
    </div>
  </div>
  <wa-button
    appearance="plain"
    class="chat-branches-toggle"
    :title="branchesOpen ? 'Hide branches' : 'Show branches'"
    :aria-label="branchesOpen ? 'Hide branches' : 'Show branches'"
    :aria-expanded.prop="branchesOpen"
    :aria-pressed.prop="branchesOpen"
    :class="{ active: branchesOpen }"
    @click.stop="$emit('toggle-branches')"
  >
    <wa-icon name="code-branch"></wa-icon>
    <span v-if="branchCount" class="chat-branches-count">{{ branchCount }}</span>
  </wa-button>
</div>
