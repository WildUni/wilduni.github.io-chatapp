<wa-drawer label="Profile" id="drawer-dismiss" placement="bottom">
    <div class="profile-wrapper">
        <img v-if="profileImageUrl" :src="profileImageUrl" class="profile-image"/>
        <div class="profile-info-wrapper">
            <div class="profile-text-info">
                <h2>Username: </h2>
                <p><input v-model="editedName"></p>
            </div>
            <div class="profile-text-info">
                <h2>Bio: </h2>
                <p><textarea v-model="editedBio"></p>
            </div>
            <!-- <button @click="saveChanges">Save</button> -->
        </div> 
    </div>
    <wa-button slot="footer" variant="brand" @click=saveChanges>Save</wa-button>
</wa-drawer>
