
<wa-button appearance="filled" data-drawer="open drawer-dismiss" class="profile-pill">
    <img :src="profileImageUrl" class="profile-pill-avatar" slot="start"/>
    <div class="profile-pill-text-wrapper">
        <div class="profile-pill-name">
            {{profileName}}
        </div>
        <div>
            (click here to change)
        </div>
    </div>
</wa-button>
<wa-drawer label="Profile" id="drawer-dismiss" placement="bottom">
    <div class="profile-wrapper">
        <img v-if="profileImageUrl" :src="profileImageUrl" class="profile-image"/>
        <div class="profile-info-wrapper">
            <div class="profile-text-info">
                <h6>Displayed Name: </h6>
                <input v-model="editedName">
            </div>
            <div class="profile-text-info">
                <h6>Leave a note to others ~ </h6>
                <textarea v-model="editedBio"></textarea>
            </div>
        </div>
    </div>
    <wa-button slot="footer" variant="brand" @click="saveChanges">Save</wa-button>
</wa-drawer>
