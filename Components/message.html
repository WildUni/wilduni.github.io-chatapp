<div
    ref="messageWrapper"
    class="message-wrapper"
    :class="{ 'own-message': isOwnMessage, 'pending-message': isPending, 'failed-message': pendingStatus === 'failed', 'actions-open': isActionTrayPinned }"
    @click="toggleActionTray"
>
    <div class="avatar" :class="{ 'avatar-placeholder': !showAvatar }">
        <wa-skeleton
            v-if="showAvatar && avatarIsLoading"
            effect="pulse"
            class="message-avatar-skeleton"
        ></wa-skeleton>
        <button
            v-else-if="showAvatar"
            type="button"
            class="message-avatar-button"
            title="View profile"
            aria-label="View profile"
            @click.stop="toggleProfileCard"
        >
            <wa-avatar
                label="User avatar"
                :image.prop="avatarUrl || ''"
                class="message-avatar"
            ></wa-avatar>
        </button>

        <div
            v-if="showAvatar && isProfileCardOpen"
            class="message-profile-card"
            @click.stop
        >
            <wa-avatar
                label="Profile image"
                :image.prop="avatarUrl || ''"
                class="message-profile-card-avatar"
            ></wa-avatar>
            <div class="message-profile-card-copy">
                <strong>{{ username }}</strong>
                <span v-if="profilePronouns" class="message-profile-card-pronouns">{{ profilePronouns }}</span>
                <p>{{ profileBio || "No bio yet." }}</p>
            </div>
        </div>
    </div>

    <div class="message-stack">
        <button
            v-if="showName"
            type="button"
            class="message-chunk-name"
            title="Mention user"
            @click.stop="$emit('mention-user')"
        >
            {{username}}
        </button>

        <wa-card
            class="card-header"
            :class="{ 'media-message-card': mediaAttachments?.length }"
        >
            <div v-if="isPinned" class="message-pin-badge" title="Pinned">
                <wa-icon name="thumbtack"></wa-icon>
            </div>
            <button
                v-if="replyToContent && !isRecalled"
                type="button"
                class="message-reply-context"
                title="Jump to replied message"
                @click.stop="$emit('open-reply')"
            >
                {{ replyToContent }}
            </button>
            <div v-if="isRecalled" class="message-state-note message-recalled-note">
                This message was recalled.
            </div>
            <div v-else-if="messageContent" class="message-body-content">
                <template v-for="(part, index) in linkifyText(messageContent)" :key="index">
                    <a
                        v-if="part.type === 'link'"
                        :href="part.href"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="message-link"
                        @click.stop
                    >{{ part.text }}</a>
                    <span v-else>{{ part.text }}</span>
                </template>
            </div>
            <div v-if="isEdited && !isRecalled" class="message-state-note message-edited-note">
                Edited
            </div>
            <div
                v-if="!isRecalled && mediaAttachments?.length"
                class="message-media-grid"
                :class="{ 'message-media-grid-single': mediaAttachments.length === 1 }"
            >
                <MediaAttachment
                    v-for="attachment in mediaAttachments"
                    :key="attachment.url || attachment.previewUrl || attachment.name"
                    :attachment="attachment"
                ></MediaAttachment>
            </div>
            <div class="message-hover-actions">
                <wa-button
                    appearance="plain"
                    class="message-action-button"
                    :class="{ 'is-active': isLiked }"
                    :title="isLiked ? 'Unlike message' : 'Like message'"
                    :aria-label="isLiked ? 'Unlike message' : 'Like message'"
                    :disabled.prop="isPending"
                    @click.stop="$emit('toggle-like')"
                >
                    <wa-icon name="heart"></wa-icon>
                </wa-button>
                <wa-button
                    appearance="plain"
                    class="message-action-button"
                    :class="{ 'is-active': isPinned }"
                    :title="isPinned ? 'Unpin message' : 'Pin message'"
                    :aria-label="isPinned ? 'Unpin message' : 'Pin message'"
                    :disabled.prop="isPending"
                    @click.stop="$emit('toggle-pin')"
                >
                    <wa-icon name="thumbtack"></wa-icon>
                </wa-button>
                <wa-button
                    appearance="plain"
                    class="message-action-button"
                    title="Reply to message"
                    aria-label="Reply to message"
                    :disabled.prop="isPending"
                    @click.stop="$emit('reply')"
                >
                    <wa-icon name="reply"></wa-icon>
                </wa-button>
                <span v-if="canManageMessage && !isPending && !isRecalled" class="message-action-divider"></span>
                <wa-button
                    v-if="canManageMessage && !isPending && !isRecalled"
                    appearance="plain"
                    class="message-action-button"
                    title="Edit message"
                    aria-label="Edit message"
                    @click.stop="requestEdit"
                >
                    <wa-icon name="pen-to-square"></wa-icon>
                </wa-button>
                <wa-button
                    v-if="canManageMessage && !isPending && !isRecalled"
                    appearance="plain"
                    class="message-action-button message-action-danger"
                    title="Recall message"
                    aria-label="Recall message"
                    @click.stop="recallMessage"
                >
                    <wa-icon name="rotate-left"></wa-icon>
                </wa-button>
            </div>
        </wa-card>
        <div v-if="likeCount > 0" class="message-like-badge" title="Message likes">
            <wa-icon name="heart"></wa-icon>
            <span>{{ likeCount }}</span>
        </div>
        <div v-if="isPending" class="message-send-status">
            {{ pendingStatus === "failed" ? "Could not send" : "Sending..." }}
        </div>
    </div>
</div>
