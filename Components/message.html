<div class="message-wrapper" :class="{ 'own-message': isOwnMessage }">
    <div class="avatar" :class="{ 'avatar-placeholder': !showAvatar }">
        <wa-avatar
            v-if="showAvatar"
            label="User avatar"
            :image.prop="avatarUrl || ''"
            class="message-avatar"
        ></wa-avatar>
    </div>

    <div class="message-stack">
        <div v-if="showName" class="message-chunk-name">
            {{username}}
        </div>

        <wa-card class="card-header">
            <div class="message-body-content">
                {{messageContent}}
            </div>
        </wa-card>
    </div>
</div>
