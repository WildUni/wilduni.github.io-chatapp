<div class="message-wrapper flex">
    <!-- <wa-avatar label="User avatar" :src="avatarUrl"></wa-avatar>
     -->
    <div class="avatar">
        <img v-if='avatarUrl' :src="avatarUrl" alt="User avatar" />
        <wa-avatar v-else label="User avatar" :src="avatarUrl"></wa-avatar>
    </div>
    
    <div class="message-text-container">
        <div class="message-username">
            {{username}}
        </div>
        <div class="message-content">
            {{messageContent}}
        </div>
        
    </div>
    {{ new Date(published).toLocaleString('en-US') }}
</div>
