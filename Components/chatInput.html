
<div class="inputContainer">
    <div v-if="composerTarget" class="reply-composer-preview">
        <div class="reply-composer-copy">
            <span>{{ isEditingMessage ? "Editing message" : "Replying to" }}</span>
            <strong>{{ composerTarget.previewContent || composerTarget.content }}</strong>
        </div>
        <wa-button
            appearance="plain"
            class="reply-clear-button"
            :title="isEditingMessage ? 'Cancel edit' : 'Cancel reply'"
            :aria-label="isEditingMessage ? 'Cancel edit' : 'Cancel reply'"
            @click="clearComposerTarget"
        >
            <wa-icon name="xmark"></wa-icon>
        </wa-button>
    </div>
    <label
        class="media-upload-button"
        :class="{ 'is-disabled': isSending || isEditingMessage || selectedMedia.length >= 4 }"
        title="Attach image, video, or PDF"
        aria-label="Attach image, video, or PDF"
    >
        <wa-icon name="paperclip"></wa-icon>
        <input
            type="file"
            accept="image/*,video/*,application/pdf,.pdf"
            multiple
            :disabled="isSending || isEditingMessage || selectedMedia.length >= 4"
            @change="handleMediaSelect"
        />
    </label>
    <textarea
        ref="messageInput"
        class="message-input"
        placeholder="Message"
        rows="1"
        :value="myMessage"
        :disabled="isSending"
        @input="handleMessageInput"
        @keydown="handleMessageKeydown"
    ></textarea>
    <button @click="sendMessage" :disabled="isSubmitDisabled">
        {{ submitLabel }}
    </button>
    <div v-if="selectedMedia.length" class="composer-media-list">
        <div
            v-for="item in selectedMedia"
            :key="item.id"
            class="composer-media-item"
        >
            <img
                v-if="item.kind === 'image'"
                :src="item.previewUrl"
                :alt="item.file.name"
                class="composer-media-thumb"
            />
            <video
                v-else-if="item.kind === 'video'"
                :src="item.previewUrl"
                class="composer-media-thumb"
                muted
                preload="metadata"
            ></video>
            <div v-else class="composer-media-thumb composer-media-document-thumb">
                <wa-icon name="file-pdf"></wa-icon>
            </div>
            <div class="composer-media-meta">
                <strong>{{ item.file.name }}</strong>
                <span>{{ formatBytes(item.file.size) }}</span>
            </div>
            <button
                type="button"
                class="composer-media-remove"
                title="Remove attachment"
                aria-label="Remove attachment"
                @click="removeSelectedMedia(item.id)"
            >
                <wa-icon name="xmark"></wa-icon>
            </button>
        </div>
    </div>
</div>
<p v-if="sendError" class="error">{{ sendError }}</p>
