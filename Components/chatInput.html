
<div class="inputContainer">
    <div v-if="replyTarget" class="reply-composer-preview">
        <div class="reply-composer-copy">
            <span>Replying to</span>
            <strong>{{ replyTarget.content }}</strong>
        </div>
        <wa-button
            appearance="plain"
            class="reply-clear-button"
            title="Cancel reply"
            aria-label="Cancel reply"
            @click="clearReplyTarget"
        >
            <wa-icon name="xmark"></wa-icon>
        </wa-button>
    </div>
    <wa-input placeholder="Your Message..." 
    with-clear 
    :value='myMessage' 
    @input="myMessage = $event.target.value"
    @keydown.enter="sendMessage" 
    class="message-input"></wa-input>
    <button @click="sendMessage" :disabled="!myMessage.length">Send</button>
</div>
<p v-if="sendError" class="error">{{ sendError }}</p>
