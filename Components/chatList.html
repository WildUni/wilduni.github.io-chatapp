<ul v-if="isChatListLoading" class="chat-list-skeleton" aria-label="Loading chats">
    <li v-for="index in 5" :key="index" class="chat-list-skeleton-item">
        <wa-skeleton effect="sheen" class="chat-list-skeleton-avatar"></wa-skeleton>
        <div class="chat-list-skeleton-copy">
            <wa-skeleton effect="sheen" class="chat-list-skeleton-title"></wa-skeleton>
            <wa-skeleton effect="sheen" class="chat-list-skeleton-subtitle"></wa-skeleton>
        </div>
    </li>
</ul>

<ul v-else>
    <li v-for="chat in chatList" :key="chat.value.chatId">
        <ChatListItem
            :chatId="chat.value.chatId"
            :chatName="chat.value.displayChatName"
            :chatImageUrl="chatImageUrls[chat.value.chatId] || ''"
            :isChatImageLoading="chatImageLoadingByChat[chat.value.chatId]"
            :preview-members="chatPreviewMembersByChatId[chat.value.chatId] || []"
            :hasUnread="hasUnreadByRootChatId[chat.value.chatId]"
            :latest-message="latestMessageByRootChatId[chat.value.chatId]"
            @click="emitUpdateChat(chat.value.chatId, chat.value.displayChatName, chat.value.chatId, chat.value.chatId)"
        ></ChatListItem>
    </li>
</ul>
