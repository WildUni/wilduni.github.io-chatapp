<ul>
    <li v-for="chat in chatList" :key="chat.value.chatId">
        <ChatListItem
            :chatId="chat.value.chatId"
            :chatName="chat.value.chatName"
            :chatImageUrl="chatImageUrls[chat.value.chatId] || ''"
            @click="emitUpdateChat(chat.value.chatId, chat.value.chatName, chat.value.chatId, chat.value.chatId)"
        ></ChatListItem>
    </li>
</ul>
