<wa-button
    v-if="activeChatId"
    appearance="outlined"
    data-drawer="open chat-members-drawer"
    class="chat-members-button">
    <wa-icon name="users" slot="start"></wa-icon>
    {{ members.length }}
</wa-button>

<wa-drawer label="Chat Members" id="chat-members-drawer" placement="end" class="chat-side-panel">
    <div class="chat-members-wrapper">
        <div v-if="activeChatId" class="chat-share-panel">
            <div class="chat-share-row">
                <div class="chat-share-text">
                    <div class="chat-share-label">Chat ID</div>
                    <div class="chat-share-value">{{ shareChatId }}</div>
                </div>
                <wa-copy-button
                    :value="shareChatId"
                    copy-label="Copy chat ID"
                    success-label="Chat ID copied"
                    error-label="Copy failed"
                ></wa-copy-button>
            </div>

            <div class="chat-share-row">
                <div class="chat-share-text">
                    <div class="chat-share-label">Join link</div>
                    <div class="chat-share-value">{{ joinChatLink }}</div>
                </div>
                <wa-copy-button
                    :value="joinChatLink"
                    copy-label="Copy join link"
                    success-label="Join link copied"
                    error-label="Copy failed"
                ></wa-copy-button>
            </div>
        </div>

        <div class="chat-members-summary">
            {{ members.length }} {{ members.length === 1 ? "member" : "members" }}
        </div>

        <ul v-if="members.length" class="chat-members-list">
            <li v-for="member in members" :key="member.user" class="chat-member-item">
                <wa-avatar
                    label="Member avatar"
                    :image.prop="member.profile.avatarUrl || ''"
                    class="chat-member-avatar"
                ></wa-avatar>

                <div class="chat-member-text">
                    <div class="chat-member-name">
                        {{ member.profile.name }}
                    </div>
                    <div class="chat-member-id">
                        {{ member.user }}
                    </div>
                </div>
            </li>
        </ul>

        <div v-else class="chat-members-empty">
            No members found for this chat.
        </div>
    </div>
</wa-drawer>
